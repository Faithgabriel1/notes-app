<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

  <div class="container">
    <h1>My Notes</h1>

    <form id="note-form">
      <input type="text" id="title-input" placeholder="Note title" required />
      <textarea id="content-input" placeholder="Note content..." rows="3" maxlength="500"></textarea>
      <span id="char-count" class="char-count">0/500</span>
      <button type="submit">Add Note</button>
    </form>

    <input type="text" id="search-input" placeholder="Search notes by title..." class="search-input" />

    <div id="notes-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
