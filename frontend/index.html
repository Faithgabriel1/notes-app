<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

  <!-- AUTH SCREEN: shown when not logged in -->
  <div class="container" id="auth-container">
    <h1 id="auth-title">Log In</h1>

    <form id="auth-form">
      <input type="email" id="auth-email" placeholder="Email" required />
      <input type="password" id="auth-password" placeholder="Password" required />
      <button type="submit" id="auth-submit-btn">Log In</button>
    </form>

    <p id="auth-error" class="auth-error"></p>

    <p class="auth-toggle-text">
      <span id="auth-toggle-question">Don't have an account?</span>
      <a href="#" id="auth-toggle-link">Sign Up</a>
    </p>
  </div>

  <!-- NOTES APP: shown after login -->
  <div class="container" id="app-container" style="display: none;">
    <div class="app-header">
      <h1>My Notes</h1>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </div>

    <form id="note-form">
      <input type="text" id="title-input" placeholder="Note title" required />
      <textarea id="content-input" placeholder="Note content..." rows="3" maxlength="500"></textarea>
      <span id="char-count" class="char-count">0/500</span>
      <button type="submit">Add Note</button>
    </form>

    <input type="text" id="search-input" placeholder="Search notes by title..." class="search-input" />

    <div id="notes-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
